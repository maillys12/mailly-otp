<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>เติมเงิน - Mailly OTP</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <style>
    :root {
      --bg-color: #F8F9FA;
      --card-bg: #FFFFFF;
      --border-color: #EAEAEA;
      --text-main: #2D2926;
      --text-muted: #7A7A7A;
      --primary: #C5A059;
      --primary-hover: #AA843D;
      --success: #10B981;
      --success-bg: #E6F4EA;
      --danger: #EF4444;
      --danger-bg: #FEE2E2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Prompt', 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 20px 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .topup-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 40px 30px;
      border-radius: 16px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.04);
    }
    
    .card-header { text-align: center; margin-bottom: 28px; }
    
    .wallet-icon-box {
      width: 64px;
      height: 64px;
      background: rgba(197, 160, 89, 0.1);
      color: var(--primary-hover);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px auto;
      font-size: 26px;
      box-shadow: 0 4px 15px rgba(197, 160, 89, 0.15);
    }

    .card-header h2 { font-size: 24px; font-weight: 600; color: var(--text-main); }
    .card-header p { font-size: 14px; color: var(--text-muted); margin-top: 6px; }

    .form-group { margin-bottom: 20px; width: 100%; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }

    .input-wrapper { position: relative; display: flex; align-items: center; }
    .input-icon { position: absolute; left: 14px; color: #A1A1A1; font-size: 15px; }

    .form-input {
      width: 100%;
      padding: 12px 14px 12px 40px;
      background-color: #FAFAFA;
      border: 1px solid #D1D1D1;
      color: var(--text-main);
      border-radius: 10px;
      font-family: 'Prompt', sans-serif;
      font-size: 15px;
      outline: none;
      transition: all 0.2s ease;
    }
    
    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 5px rgba(197, 160, 89, 0.2);
      background-color: #FFFFFF;
    }

    .form-input.amount-input { padding-left: 32px; font-weight: 600; font-size: 18px; color: var(--primary-hover); }

    .remember-me-box { display: flex; align-items: center; margin-top: 8px; padding-left: 2px; }
    .remember-me-box input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
    .remember-me-box label { margin: 0 0 0 8px !important; font-size: 13px !important; color: var(--text-muted); cursor: pointer; }

    .amount-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 24px; }
    .btn-amount-choice {
      font-family: 'Prompt', sans-serif;
      padding: 10px 0;
      background: #FAFAFA;
      border: 1px solid #E2E8F0;
      color: var(--text-main);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn-amount-choice:hover { background: rgba(197, 160, 89, 0.08); border-color: var(--primary); color: var(--primary-hover); }

    .btn {
      font-family: 'Prompt', sans-serif;
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      font-weight: 500;
      font-size: 15px;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .btn-primary { background-color: var(--primary); color: #FFFFFF; box-shadow: 0 4px 12px rgba(197, 160, 89, 0.15); }
    .btn-primary:hover:not(:disabled) { background-color: var(--primary-hover); box-shadow: 0 4px 16px rgba(197, 160, 89, 0.25); }
    .btn-secondary { background-color: #F1F3F5; color: var(--text-muted); margin-top: 12px; }
    .btn-secondary:hover { background-color: #E9ECEF; color: var(--text-main); }
    .btn-success { background-color: var(--success); color: #FFFFFF; }

    .alert-message { padding: 12px; border-radius: 10px; text-align: center; font-size: 14px; margin-top: 16px; }
    .alert-success { background-color: var(--success-bg); color: #065F46; }
    .alert-error { background-color: var(--danger-bg); color: #991B1B; }
    .hidden { display: none !important; }

    .spinner { width: 18px; height: 18px; border: 2px solid #FFF; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px);
      display: flex; justify-content: center; align-items: center; padding: 15px;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .modal-overlay.show { opacity: 1; pointer-events: auto; }
    .modal-box {
      background: var(--card-bg); border: 1px solid var(--border-color);
      border-radius: 20px; width: 100%; max-width: 380px; padding: 24px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.1); position: relative; text-align: center;
      transform: scale(0.95); transition: transform 0.3s ease;
    }
    .modal-overlay.show .modal-box { transform: scale(1); }
    .modal-close-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-muted); }

    .qr-title { font-size: 15px; font-weight: 600; color: var(--text-main); margin: 8px 0 12px 0; }
    .qr-container { background: #FFF; padding: 12px; border-radius: 16px; display: inline-block; border: 1px solid var(--border-color); }
    .qr-image { width: 190px; height: 190px; margin: 0 auto; display: block; object-fit: contain; }
    .account-holder { font-size: 13px; color: var(--text-muted); font-weight: 500; margin: 6px 0 16px 0; }

    .file-upload-box { text-align: left; border-top: 1px solid var(--border-color); padding-top: 16px; margin-bottom: 16px; }
    .file-upload-box label { display: block; font-size: 13px; font-weight: 600; color: var(--text-main); margin-bottom: 8px; }
    .file-input-styled { width: 100%; font-size: 12px; color: var(--text-muted); border: 1px solid #D1D1D1; border-radius: 10px; padding: 6px; background: #FFF; outline: none; }
    .file-input-styled::file-selector-button { font-family: 'Prompt'; background: rgba(197, 160, 89, 0.1); color: var(--primary-hover); border: 0; padding: 6px 14px; border-radius: 8px; margin-right: 10px; cursor: pointer; }

    @media(max-width: 480px) {
      .topup-card { padding: 30px 20px; }
      .amount-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    }
  </style>
</head>
<body>

  <div class="topup-card">
    <div class="card-header">
      <div class="wallet-icon-box">
        <i class="fa-solid fa-wallet"></i>
      </div>
      <h2>ระบบเติมเงินอัตโนมัติ</h2>
      <p>เพิ่มเครดิตเข้าสู่บัญชี Mailly OTP ของคุณ</p>
    </div>

    <div class="form-group">
      <label for="username">ชื่อผู้ใช้งาน (Username)</label>
      <div class="input-wrapper">
        <span class="input-icon"><i class="fa-solid fa-user"></i></span>
        <input type="text" id="username" oninput="handleInputChange()" placeholder="ระบุ Username เดียวกับในระบบเดิม" class="form-input">
      </div>

      <div class="remember-me-box">
        <input type="checkbox" id="rememberMe">
        <label for="rememberMe">จดจำอุปกรณ์นี้ไว้ (ไม่ต้องกรอก Username ซ้ำ)</label>
      </div>
    </div>

    <div class="form-group">
      <label for="amount">จำนวนเงินที่ต้องการเติม (ขั้นต่ำ 50 บาท)</label>
      <div class="input-wrapper">
        <span class="input-icon" style="font-weight: bold; color: var(--primary-hover);">฿</span>
        <input type="number" id="amount" oninput="handleInputChange()" placeholder="50.00" min="50" class="form-input amount-input">
      </div>
    </div>

    <div class="amount-grid">
      <button type="button" onclick="setAmount(50)" class="btn-amount-choice">50</button>
      <button type="button" onclick="setAmount(100)" class="btn-amount-choice">100</button>
      <button type="button" onclick="setAmount(300)" class="btn-amount-choice">300</button>
      <button type="button" onclick="setAmount(500)" class="btn-amount-choice">500</button>
    </div>

    <button id="btnGenerateQR" onclick="confirmAndGenerateQR()" class="btn btn-primary">
      <span id="btnQRText">ยืนยันจำนวนเงิน & สร้าง QR Code</span>
      <div id="qrSpinner" class="spinner hidden"></div>
    </button>

    <div id="resultMessage" class="alert-message hidden"></div>

    <button type="button" onclick="backToMain()" class="btn btn-secondary">
      <i class="fa-solid fa-arrow-left" style="font-size: 13px;"></i>
      <span>ย้อนกลับไปหน้าหลัก</span>
    </button>
  </div>

  <div id="qrModal" class="modal-overlay hidden">
    <div style="position: absolute; inset: 0;" onclick="closeModal()"></div>
    <div id="modalContent" class="modal-box">
      <button onclick="closeModal()" class="modal-close-btn"><i class="fa-solid fa-xmark"></i></button>

      <div>
        <p class="qr-title"><i class="fa-solid fa-qrcode" style="color: var(--primary); margin-right: 4px;"></i> สแกนจ่ายผ่านแอปธนาคาร</p>
        <div class="qr-container">
          <img id="qrImage" src="" alt="PromptPay QR Code" class="qr-image">
        </div>
        <p class="account-holder">ชื่อบัญชีผู้รับ: ชนกานต์ ปีนะถา</p>
      </div>
      
      <div class="file-upload-box">
        <label for="slipFile"><i class="fa-solid fa-image" style="color: var(--success); margin-right: 4px;"></i> อัปโหลดรูปภาพสลิปโอนเงิน:</label>
        <input type="file" id="slipFile" onchange="document.getElementById('modalResultMessage').classList.add('hidden')" accept="image/*" class="file-input-styled">
      </div>

      <div id="modalResultMessage" class="alert-message alert-error hidden" style="margin-top: 0; margin-bottom: 14px; padding: 10px; font-size: 13px;"></div>

      <button id="btnSubmit" onclick="submitTopup()" class="btn btn-success">
        <span id="btnText">อัปโหลด & ยืนยันสลิป</span>
        <div id="spinner" class="spinner hidden"></div>
      </button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwQz6KOmhuPdipUnNwh4sYFT2etnvb0W_yrS00andPfKc7IeZr5HaNs8-57_P0ochFxew/exec";
    const PROMPTPAY_ID = "0633390911"; 

    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const urlUser = urlParams.get('user') || urlParams.get('username');
      const savedUser = urlUser || localStorage.getItem('username') || localStorage.getItem('mailly_remembered_user') || localStorage.getItem('mailly_otp_username');

      if (savedUser) {
        document.getElementById('username').value = savedUser;
        document.getElementById('rememberMe').checked = true;
      }
    });

    function setAmount(value) { document.getElementById('amount').value = value; handleInputChange(); }
    function handleInputChange() { document.getElementById('resultMessage').classList.add('hidden'); }
    function openModal() {
      const modal = document.getElementById('qrModal');
      document.getElementById('modalResultMessage').classList.add('hidden'); 
      modal.classList.remove('hidden');
      setTimeout(() => modal.classList.add('show'), 10);
    }
    function closeModal() {
      const modal = document.getElementById('qrModal');
      modal.classList.remove('show');
      setTimeout(() => modal.classList.add('hidden'), 300);
    }

    function confirmAndGenerateQR() {
      const username = document.getElementById('username').value.trim();
      const amount = document.getElementById('amount').value.trim();
      const qrImage = document.getElementById('qrImage');
      const btnGenerateQR = document.getElementById('btnGenerateQR');
      const btnQRText = document.getElementById('btnQRText');
      const qrSpinner = document.getElementById('qrSpinner');

      if (!username) { return showResult('กรุณากรอกชื่อผู้ใช้งานก่อนครับ', 'error'); }
      if (!amount || parseFloat(amount) < 50) { return showResult('❌ กรุณาระบุจำนวนเงินขั้นต่ำ 50 บาทครับ', 'error'); }

      const cleanPromptPayId = PROMPTPAY_ID.replace(/[^0-9]/g, '');

      if (document.getElementById('rememberMe').checked) {
        localStorage.setItem('username', username);
        localStorage.setItem('mailly_remembered_user', username);
        localStorage.setItem('mailly_otp_username', username);
      } else {
        localStorage.removeItem('username');
        localStorage.removeItem('mailly_remembered_user');
        localStorage.removeItem('mailly_otp_username');
      }

      btnGenerateQR.disabled = true;
      btnQRText.innerText = 'กำลังสร้างคิวอาร์โค้ด...';
      qrSpinner.classList.remove('hidden');
      document.getElementById('resultMessage').classList.add('hidden');

      qrImage.src = "https://promptpay.io/" + cleanPromptPayId + "/" + parseFloat(amount).toFixed(2) + ".png";
      
      setTimeout(() => {
        btnGenerateQR.disabled = false;
        btnQRText.innerText = 'ยืนยันจำนวนเงิน & สร้าง QR Code';
        qrSpinner.classList.add('hidden');
        openModal();
      }, 1000);
    }

    function submitTopup() {
      const username = document.getElementById('username').value.trim();
      const amount = document.getElementById('amount').value.trim();
      const fileInput = document.getElementById('slipFile');
      const btnSubmit = document.getElementById('btnSubmit');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('spinner');

      if (fileInput.files.length === 0) {
        showModalResult('กรุณาเลือกรูปภาพสลิปโอนเงินก่อนครับ', 'error');
        return;
      }

      btnSubmit.disabled = true;
      btnText.innerText = 'กำลังส่งตรวจสลิป...';
      spinner.classList.remove('hidden');

      const file = fileInput.files[0];
      const reader = new FileReader();
      
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          let width = img.width, height = img.height, MAX_SIZE = 1000;
          if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } }
          else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.75);
          const base64Data = compressedDataUrl.split(',')[1];

          fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({
              action: "topupUserCredit",
              payload: { username: username, amount: amount, imageObj: { base64: base64Data, mimeType: 'image/jpeg' } }
            })
          })
          .then(res => res.json())
          .then(response => {
            resetButton();
            if (response.success) {
              closeModal(); 
              showResult(response.message + '<br>ยอดเงินคงเหลือใหม่: ' + response.newCredit + ' ฿', 'success');
              document.getElementById('amount').value = '';
              fileInput.value = '';
            } else {
              showModalResult(response.message, 'error');
            }
          })
          .catch(err => {
            resetButton();
            showModalResult('ระบบขัดข้อง: ' + err.toString(), 'error');
          });
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function resetButton() {
      document.getElementById('btnSubmit').disabled = false;
      document.getElementById('btnText').innerText = 'อัปโหลด & ยืนยันสลิป';
      document.getElementById('spinner').classList.add('hidden');
    }

    function showResult(msg, type) {
      const resultMessage = document.getElementById('resultMessage');
      resultMessage.innerHTML = msg;
      resultMessage.className = 'alert-message ' + (type === 'success' ? 'alert-success' : 'alert-error');
    }

    function showModalResult(msg, type) {
      const modalResult = document.getElementById('modalResultMessage');
      modalResult.innerHTML = msg;
      modalResult.classList.remove('hidden');
    }

    function backToMain() { window.location.href = 'index.html'; }
  </script>
</body>
</html>
