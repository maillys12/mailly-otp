<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบเติมเงินเครดิต</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <style>
    :root {
      --bg-color: #F8F9FA;        
      --card-bg: #FFFFFF;         
      --border-color: #EAEAEA;    
      --text-main: #2D2926;       
      --text-muted: #7A7A7A;      
      --primary: #C5A059;         
      --primary-hover: #AA843D;   
      --success: #10B981;
      --danger: #EF4444;
    }

    body {
      font-family: 'Prompt', sans-serif; background-color: var(--bg-color); color: var(--text-main);
      padding: 20px 15px; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box;
    }

    .topup-card {
      background: var(--card-bg); border: 1px solid var(--border-color); padding: 40px 30px;
      border-radius: 16px; width: 100%; max-width: 440px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); box-sizing: border-box;
    }
    .card-header { text-align: center; margin-bottom: 28px; }
    .wallet-icon-box {
      width: 64px; height: 64px; background: rgba(197, 160, 89, 0.1); color: var(--primary-hover);
      border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px auto; font-size: 26px;
    }
    .card-header h2 { font-size: 24px; font-weight: 600; margin: 0; }
    .card-header p { font-size: 14px; color: var(--text-muted); margin: 6px 0 0 0; }

    .form-group { margin-bottom: 20px; width: 100%; box-sizing: border-box; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
    .input-wrapper { position: relative; display: flex; align-items: center; }
    .input-icon { position: absolute; left: 14px; color: #A1A1A1; font-size: 15px; }
    .form-input {
      width: 100%; padding: 12px 14px 12px 40px; background-color: #FAFAFA; border: 1px solid #D1D1D1;
      color: var(--text-main); border-radius: 10px; font-family: 'Prompt'; font-size: 15px; outline: none; box-sizing: border-box;
    }
    .form-input.amount-input { padding-left: 32px; font-weight: 600; font-size: 18px; color: var(--primary-hover); }

    .remember-me-box { display: flex; align-items: center; margin-top: 8px; }
    .remember-me-box input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
    .remember-me-box label { margin: 0 0 0 8px !important; font-size: 13px !important; color: var(--text-muted); cursor: pointer; }

    .amount-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 24px; }
    .btn-amount-choice {
      padding: 10px 0; background: #FAFAFA; border: 1px solid #E2E8F0; color: var(--text-main);
      border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'Prompt';
    }
    .btn-amount-choice:hover { background: rgba(197, 160, 89, 0.08); border-color: var(--primary); color: var(--primary-hover); }

    .btn { font-family: 'Prompt'; width: 100%; padding: 13px; border-radius: 10px; font-weight: 500; font-size: 15px; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary { background-color: var(--primary); color: #FFFFFF; }
    .btn-primary:hover { background-color: var(--primary-hover); }
    .btn-secondary { background-color: #F1F3F5; color: var(--text-muted); margin-top: 12px; }
    .btn-success { background-color: var(--success); color: #FFFFFF; }

    .alert-message { padding: 12px; border-radius: 10px; text-align: center; font-size: 14px; font-weight: 500; margin-top: 16px; }
    .alert-success { background-color: #E6F4EA; color: #065F46; }
    .alert-error { background-color: #FEE2E2; color: #991B1B; }
    .hidden { display: none !important; }

    .spinner { width: 18px; height: 18px; border: 2px solid #FFFFFF; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-overlay { position: fixed; inset: 0; z-index: 2000; background: rgba(0, 0, 0, 0.4); display: flex; justify-content: center; align-items: center; padding: 15px; }
    .modal-box { background: var(--card-bg); border-radius: 20px; width: 100%; max-width: 380px; padding: 24px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); position: relative; text-align: center; }
    .modal-close-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-muted); }
    .qr-container { background: #FFFFFF; padding: 12px; border-radius: 16px; display: inline-block; border: 1px solid var(--border-color); margin: 4px 0; }
    .qr-image { width: 190px; height: 190px; display: block; }
    .file-upload-box { text-align: left; border-top: 1px solid var(--border-color); padding-top: 16px; margin-bottom: 16px; }
    .file-input-styled { width: 100%; font-size: 12px; border: 1px solid #D1D1D1; border-radius: 10px; padding: 6px; background: #FFFFFF; }
  </style>
</head>
<body>

  <div class="topup-card">
    <div class="card-header">
      <div class="wallet-icon-box"><i class="fa-solid fa-wallet"></i></div>
      <h2>ระบบเติมเงินอัตโนมัติ</h2>
      <p>เพิ่มเครดิตเข้าสู่บัญชี Mailly OTP</p>
    </div>

    <div class="form-group">
      <label>ชื่อผู้ใช้งาน (Username)</label>
      <div class="input-wrapper">
        <span class="input-icon"><i class="fa-solid fa-user"></i></span>
        <input type="text" id="username" placeholder="ระบุ Username" class="form-input">
      </div>
      <div class="remember-me-box">
        <input type="checkbox" id="rememberMe">
        <label for="rememberMe">จดจำอุปกรณ์นี้ไว้</label>
      </div>
    </div>

    <div class="form-group">
      <label>จำนวนเงิน (ขั้นต่ำ 50 บาท)</label>
      <div class="input-wrapper">
        <span class="input-icon" style="font-weight: bold; color: var(--primary-hover);">฿</span>
        <input type="number" id="amount" placeholder="50.00" min="50" class="form-input amount-input">
      </div>
    </div>

    <div class="amount-grid">
      <button type="button" onclick="setAmount(50)" class="btn-amount-choice">50</button>
      <button type="button" onclick="setAmount(100)" class="btn-amount-choice">100</button>
      <button type="button" onclick="setAmount(300)" class="btn-amount-choice">300</button>
      <button type="button" onclick="setAmount(500)" class="btn-amount-choice">500</button>
    </div>

    <button id="btnGenerateQR" onclick="confirmAndGenerateQR()" class="btn btn-primary">
      <span id="btnQRText">ยืนยันจำนวนเงิน & สร้าง QR Code</span>
      <div id="qrSpinner" class="spinner hidden"></div>
    </button>

    <div id="resultMessage" class="alert-message hidden"></div>

    <button type="button" onclick="backToMain()" class="btn btn-secondary">
      <i class="fa-solid fa-arrow-left"></i> ย้อนกลับไปหน้าหลัก
    </button>
  </div>

  <div id="qrModal" class="modal-overlay hidden">
    <div class="modal-box">
      <button onclick="closeModal()" class="modal-close-btn">&times;</button>
      <div>
        <p style="font-weight: 600; margin-bottom: 10px;">สแกนจ่ายผ่านแอปธนาคาร</p>
        <div class="qr-container"><img id="qrImage" src="" class="qr-image"></div>
        <p style="font-size: 13px; color: var(--text-muted); margin: 6px 0 16px 0;">ชื่อผู้รับ: ชนกานต์ ปีนะถา</p>
      </div>
      
      <div class="file-upload-box">
        <label style="font-size: 13px; font-weight: 600; display: block; margin-bottom: 8px;">อัปโหลดรูปภาพสลิป:</label>
        <input type="file" id="slipFile" accept="image/*" class="file-input-styled">
      </div>

      <div id="modalResultMessage" class="alert-message alert-error hidden" style="margin-bottom: 14px; padding: 10px;"></div>

      <button id="btnSubmit" onclick="submitTopup()" class="btn btn-success">
        <span id="btnText">อัปโหลด & ยืนยันสลิป</span>
        <div id="spinner" class="spinner hidden"></div>
      </button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxRNWvNC9bo7x8v3iIPOtKazYLr-hom5zhdr4E0deu4wum9K7zGjULYaRw7vNSAAKB7hg/exec";
    const PROMPTPAY_ID = "0633390911"; 

    window.addEventListener('DOMContentLoaded', () => {
      const savedUser = localStorage.getItem('mailly_otp_username');
      if (savedUser) {
        document.getElementById('username').value = savedUser;
        document.getElementById('rememberMe').checked = true;
      }
    });

    function setAmount(v) { document.getElementById('amount').value = v; }
    function openModal() { document.getElementById('qrModal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('qrModal').classList.add('hidden'); }

    function confirmAndGenerateQR() {
      const username = document.getElementById('username').value.trim();
      const amount = document.getElementById('amount').value.trim();
      
      if (!username) return showResult('กรุณากรอกชื่อผู้ใช้งาน', 'error');
      if (!amount || parseFloat(amount) < 50) return showResult('กรุณาระบุขั้นต่ำ 50 บาท', 'error');

      if (document.getElementById('rememberMe').checked) {
        localStorage.setItem('mailly_otp_username', username);
      } else {
        localStorage.removeItem('mailly_otp_username');
      }

      document.getElementById('qrImage').src = "https://promptpay.io/" + PROMPTPAY_ID + "/" + parseFloat(amount).toFixed(2) + ".png";
      openModal();
    }

    function submitTopup() {
      const username = document.getElementById('username').value.trim();
      const amount = document.getElementById('amount').value.trim();
      const fileInput = document.getElementById('slipFile');
      
      if (fileInput.files.length === 0) {
        document.getElementById('modalResultMessage').innerText = 'กรุณาเลือกไฟล์สลิป';
        document.getElementById('modalResultMessage').classList.remove('hidden');
        return;
      }

      const btnSubmit = document.getElementById('btnSubmit');
      btnSubmit.disabled = true;
      document.getElementById('spinner').classList.remove('hidden');

      const reader = new FileReader();
      reader.onload = function(e) {
        const base64Data = e.target.result.split(',')[1];
        const imageObj = { base64: base64Data, mimeType: 'image/jpeg' };

        fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "topupUserCredit",
            payload: { username: username, amount: amount, imageObj: imageObj }
          })
        })
        .then(res => res.json())
        .then(response => {
          btnSubmit.disabled = false;
          document.getElementById('spinner').classList.add('hidden');
          
          if (response.success) {
            closeModal();
            showResult(response.message + '<br>ยอดเงินใหม่: ' + response.newCredit + ' ฿', 'success');
          } else {
            document.getElementById('modalResultMessage').innerHTML = response.message;
            document.getElementById('modalResultMessage').classList.remove('hidden');
          }
        }).catch(err => {
          btnSubmit.disabled = false;
          document.getElementById('spinner').classList.add('hidden');
          alert('Error: ' + err);
        });
      };
      reader.readAsDataURL(fileInput.files[0]);
    }

    function showResult(msg, type) {
      const rm = document.getElementById('resultMessage');
      rm.innerHTML = msg;
      rm.className = `alert-message ${type === 'success' ? 'alert-success' : 'alert-error'}`;
    }

    function backToMain() { window.location.href = 'index.html'; }
  </script>
</body>
</html>
